version: '3.8'

services:
  web:
    build: .
    # Hetzner CX22 (4 GB RAM) — RAM-optimized gunicorn config:
    #   --workers 2        : 2 workers (each holds the embedding model separately when loaded).
    #                       1 worker would be a SPOF; 3+ workers OOM on this box.
    #   --threads 1        : single-threaded per worker (we use daemon threads for bg work).
    #   --timeout 300      : long enough for PDF OCR + embedding + MiniMax API.
    #   --worker-connections 1000 : default; fine for this app's request rate.
    #   --preload-app     : load app BEFORE fork() so model/code pages are shared via COW;
    #                       reduces total RSS when 2 workers are running.
    command: >
      gunicorn quizsense.wsgi:application
      --bind 0.0.0.0:8000
      --workers 2
      --threads 1
      --timeout 300
      --worker-connections 1000
      --preload-app
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - postgres
    # Restart on crash; keep memory leak from accumulating over days.
    restart: on-failure:3

  postgres:
    image: pgvector/pgvector:pg16
    container_name: quizsense_postgres
    environment:
      POSTGRES_DB: quizsense
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    # RAM tuning for 4 GB total box (shared with web worker):
    # PostgreSQL gets ~1 GB via environment vars that pgvector image respects.
    command: >
      postgres
      -c shared_buffers=256MB
      -c effective_cache_size=512MB
      -c work_mem=16MB
      -c maintenance_work_mem=128MB
      -c max_connections=20

volumes:
  postgres_data:
