version: '3.8'

services:
  web:
    build: .
    command: gunicorn quizsense.wsgi:application --bind 0.0.0.0:8000 --workers 1 --timeout 300
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - postgres

  postgres:
    image: pgvector/pgvector:pg16
    container_name: quizsense_postgres
    environment:
      POSTGRES_DB: quizsense
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
