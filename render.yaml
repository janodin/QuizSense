databases:
  - name: quizsense-db
    databaseName: quizsense
    plan: free
    postgresMajorVersion: 16

services:
  - type: web
    name: quizsense-web
    runtime: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: python manage.py collectstatic --noinput && python manage.py check && python manage.py migrate --fake-apply quiz.0007a && python manage.py migrate && python manage.py seed_chapters_topics && python manage.py prewarm_embeddings && gunicorn quizsense.wsgi:application --workers 2 --timeout 300
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "0"
      - key: USE_POSTGRES
        value: "1"
      - key: DATABASE_URL
        fromDatabase:
          name: quizsense-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: MINIMAX_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
        # NOTE: GEMINI_API_KEY is deprecated — the app now uses MINIMAX_API_KEY above.
        # Remove this line after verifying MINIMAX is working in production.

