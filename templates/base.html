<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}QuizSense{% endblock %}</title>
    {% load static %}
    <link rel="icon" type="image/x-icon" href="{% static 'favicon.ico' %}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{% static 'css/style.css' %}" rel="stylesheet">
    <style>
        html {
            scroll-padding-top: 80px;
        }
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background-color: var(--qs-bg);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            color: var(--qs-text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            padding-top: 60px;
        }
        .main-content {
            flex: 1 0 auto;
            padding-top: 2rem;
        }
        .navbar-brand {
            font-weight: 700;
            font-size: 1.45rem;
            letter-spacing: 0.5px;
        }
        .navbar {
            background: linear-gradient(135deg, var(--qs-primary) 0%, var(--qs-primary-dark) 100%);
            box-shadow: 0 2px 12px rgba(13, 110, 253, 0.25);
        }
        .navbar-brand, .nav-link { color: #fff !important; }
        .navbar-toggler { border-color: rgba(255,255,255,0.35); }
        .navbar-toggler:focus { box-shadow: 0 0 0 0.2rem rgba(255,255,255,0.25); }
        .navbar-toggler-icon { filter: invert(1); }
        .footer {
            background: #1a1d21;
            color: #8b949e;
            font-size: 0.85rem;
        }
        .main-content {
            padding-top: 2rem;
            padding-bottom: 3rem;
        }
        .btn:focus { box-shadow: 0 0 0 3px rgba(13, 110, 253, 0.15); }
        @media (max-width: 576px) {
            .main-content { padding-top: 1.5rem; }
            .navbar-brand { font-size: 1.2rem; }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>

    <nav class="navbar navbar-expand-lg justify-content-center" style="position: fixed; top: 0; left: 0; right: 0; z-index: 1050;">
        <div class="container justify-content-center">
            <a class="navbar-brand d-flex align-items-center" href="{% url 'home' %}">
                <img src="{% static 'logo.png' %}" alt="QuizSense Logo" style="width: 32px; height: 32px; margin-right: 10px;">
                QuizSense
            </a>
        </div>
    </nav>

    {% if messages %}
    <div class="container mt-3">
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endfor %}
    </div>
    {% endif %}

    <main class="container main-content">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer mt-auto py-3">
        <div class="container text-center">
            <span>&copy; {% now "Y" %} QuizSense &mdash; AI-Powered Multiple-Choice Quiz Generator</span>
        </div>
    </footer>

    <button type="button" class="btn back-to-top" id="backToTopBtn" aria-label="Back to top">
        <i class="bi bi-arrow-up"></i>
    </button>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const backToTopBtn = document.getElementById('backToTopBtn');
        window.addEventListener('scroll', () => {
            backToTopBtn.classList.toggle('visible', window.scrollY > 350);
        });
        backToTopBtn.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
